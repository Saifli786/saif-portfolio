<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
  <defs>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f8f8;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold" font-family="Arial, sans-serif">
    Liveliness Detection System
  </text>
  <text x="400" y="80" text-anchor="middle" fill="#ffffff" font-size="16" font-family="Arial, sans-serif" opacity="0.9">
    CNN-Based Anti-Spoofing for Secure Biometric Authentication
  </text>

  <!-- Main Container -->
  <rect x="50" y="110" width="700" height="440" rx="20" fill="url(#cardGradient2)" filter="url(#shadow2)"/>

  <!-- Camera Input Section -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="200" height="360" rx="12" fill="#6a11cb" opacity="0.1" stroke="#6a11cb" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" fill="#333333" font-size="18" font-weight="bold">Live Camera</text>
    
    <!-- Camera Frame -->
    <rect x="25" y="45" width="150" height="120" rx="8" fill="#1a1a1a" stroke="#6a11cb" stroke-width="3"/>
    
    <!-- Face Detection Box -->
    <g transform="translate(60, 65)">
      <!-- Face outline -->
      <ellipse cx="40" cy="35" rx="35" ry="45" fill="url(#faceGradient)" opacity="0.3"/>
      
      <!-- Eyes -->
      <ellipse cx="30" cy="30" rx="8" ry="10" fill="url(#eyeGradient)" filter="url(#glow2)"/>
      <ellipse cx="50" cy="30" rx="8" ry="10" fill="url(#eyeGradient)" filter="url(#glow2)"/>
      <circle cx="30" cy="30" r="3" fill="#ffffff"/>
      <circle cx="50" cy="30" r="3" fill="#ffffff"/>
      
      <!-- Nose -->
      <line x1="40" y1="35" x2="40" y2="45" stroke="#6a11cb" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Mouth -->
      <path d="M 30 55 Q 40 60, 50 55" fill="none" stroke="#6a11cb" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Detection Grid -->
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#2575fc" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.6"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#2575fc" stroke-width="1" opacity="0.4"/>
      <line x1="40" y1="0" x2="40" y2="80" stroke="#2575fc" stroke-width="1" opacity="0.4"/>
    </g>
    
    <!-- Status Indicators -->
    <g transform="translate(25, 180)">
      <circle cx="10" cy="0" r="6" fill="#00d4aa"/>
      <text x="25" y="5" fill="#333333" font-size="12" font-weight="600">Face Detected</text>
      
      <circle cx="10" cy="25" r="6" fill="#00d4aa"/>
      <text x="25" y="30" fill="#333333" font-size="12" font-weight="600">Motion Tracking</text>
      
      <circle cx="10" cy="50" r="6" fill="#ffd93d"/>
      <text x="25" y="55" fill="#333333" font-size="12" font-weight="600">Processing...</text>
    </g>
    
    <!-- Blink Detection -->
    <g transform="translate(25, 260)">
      <rect x="0" y="0" width="150" height="60" rx="8" fill="#f5576c" opacity="0.1" stroke="#f5576c" stroke-width="2"/>
      <text x="75" y="20" text-anchor="middle" fill="#333333" font-size="13" font-weight="bold">Blink Test</text>
      <rect x="20" y="30" width="110" height="8" rx="4" fill="#e0e0e0"/>
      <rect x="20" y="30" width="85" height="8" rx="4" fill="#f5576c"/>
      <text x="75" y="52" text-anchor="middle" fill="#f5576c" font-size="11" font-weight="bold">77% Complete</text>
    </g>
  </g>

  <!-- CNN Processing -->
  <g transform="translate(310, 140)">
    <rect x="0" y="0" width="180" height="360" rx="12" fill="#2575fc" opacity="0.1" stroke="#2575fc" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" fill="#333333" font-size="18" font-weight="bold">Deep CNN</text>
    
    <!-- Neural Network Layers -->
    <g transform="translate(30, 50)">
      <!-- Input Layer -->
      <rect x="0" y="0" width="15" height="80" rx="3" fill="#6a11cb" opacity="0.8"/>
      <rect x="0" y="85" width="15" height="80" rx="3" fill="#6a11cb" opacity="0.8"/>
      <rect x="0" y="170" width="15" height="80" rx="3" fill="#6a11cb" opacity="0.8"/>
      <text x="7" y="275" text-anchor="middle" fill="#333333" font-size="10" font-weight="600">Input</text>
      
      <!-- Conv Layer 1 -->
      <rect x="35" y="10" width="15" height="70" rx="3" fill="#2575fc" opacity="0.8"/>
      <rect x="35" y="90" width="15" height="70" rx="3" fill="#2575fc" opacity="0.8"/>
      <rect x="35" y="170" width="15" height="70" rx="3" fill="#2575fc" opacity="0.8"/>
      <text x="42" y="275" text-anchor="middle" fill="#333333" font-size="10" font-weight="600">Conv1</text>
      
      <!-- Conv Layer 2 -->
      <rect x="70" y="20" width="15" height="60" rx="3" fill="#f093fb" opacity="0.8"/>
      <rect x="70" y="90" width="15" height="60" rx="3" fill="#f093fb" opacity="0.8"/>
      <rect x="70" y="160" width="15" height="60" rx="3" fill="#f093fb" opacity="0.8"/>
      <text x="77" y="275" text-anchor="middle" fill="#333333" font-size="10" font-weight="600">Conv2</text>
      
      <!-- Dense Layer -->
      <rect x="105" y="40" width="15" height="40" rx="3" fill="#f5576c" opacity="0.8"/>
      <rect x="105" y="90" width="15" height="40" rx="3" fill="#f5576c" opacity="0.8"/>
      <rect x="105" y="140" width="15" height="40" rx="3" fill="#f5576c" opacity="0.8"/>
      <rect x="105" y="190" width="15" height="40" rx="3" fill="#f5576c" opacity="0.8"/>
      <text x="112" y="275" text-anchor="middle" fill="#333333" font-size="10" font-weight="600">Dense</text>
      
      <!-- Connections -->
      <line x1="15" y1="40" x2="35" y2="45" stroke="#6a11cb" stroke-width="1" opacity="0.3"/>
      <line x1="15" y1="125" x2="35" y2="125" stroke="#6a11cb" stroke-width="1" opacity="0.3"/>
      <line x1="50" y1="45" x2="70" y2="50" stroke="#2575fc" stroke-width="1" opacity="0.3"/>
      <line x1="85" y1="80" x2="105" y2="90" stroke="#f093fb" stroke-width="1" opacity="0.3"/>
    </g>
    
    <!-- Feature Labels -->
    <rect x="15" y="295" width="150" height="20" rx="10" fill="#6a11cb" opacity="0.15"/>
    <text x="90" y="309" text-anchor="middle" fill="#333333" font-size="11" font-weight="600">Texture Analysis</text>
    
    <rect x="15" y="320" width="150" height="20" rx="10" fill="#2575fc" opacity="0.15"/>
    <text x="90" y="334" text-anchor="middle" fill="#333333" font-size="11" font-weight="600">Pattern Recognition</text>
  </g>

  <!-- Output Decision -->
  <g transform="translate(520, 140)">
    <rect x="0" y="0" width="200" height="360" rx="12" fill="#00d4aa" opacity="0.1" stroke="#00d4aa" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" fill="#333333" font-size="18" font-weight="bold">Verification</text>
    
    <!-- Authentication Result -->
    <g transform="translate(50, 60)">
      <!-- Shield Icon -->
      <path d="M 50 10 L 30 20 L 30 45 Q 30 65, 50 75 Q 70 65, 70 45 L 70 20 Z" 
            fill="#00d4aa" opacity="0.3" stroke="#00d4aa" stroke-width="3" filter="url(#glow2)"/>
      <path d="M 40 40 L 47 50 L 62 30" 
            fill="none" stroke="#00d4aa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)"/>
    </g>
    
    <!-- Results Display -->
    <rect x="20" y="150" width="160" height="60" rx="10" fill="#00d4aa" opacity="0.9" filter="url(#shadow2)"/>
    <text x="100" y="172" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">✓ REAL FACE</text>
    <text x="100" y="195" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold">96.8%</text>
    <text x="100" y="210" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.9">Confidence</text>
    
    <!-- Anti-Spoofing Checks -->
    <g transform="translate(20, 230)">
      <rect x="0" y="0" width="160" height="30" rx="8" fill="#333333" opacity="0.05"/>
      <circle cx="15" cy="15" r="6" fill="#00d4aa"/>
      <text x="30" y="20" fill="#333333" font-size="12" font-weight="600">Texture ✓</text>
      <text x="145" y="20" text-anchor="end" fill="#00d4aa" font-size="12" font-weight="bold">98%</text>
    </g>
    
    <g transform="translate(20, 270)">
      <rect x="0" y="0" width="160" height="30" rx="8" fill="#333333" opacity="0.05"/>
      <circle cx="15" cy="15" r="6" fill="#00d4aa"/>
      <text x="30" y="20" fill="#333333" font-size="12" font-weight="600">Motion ✓</text>
      <text x="145" y="20" text-anchor="end" fill="#00d4aa" font-size="12" font-weight="bold">95%</text>
    </g>
    
    <g transform="translate(20, 310)">
      <rect x="0" y="0" width="160" height="30" rx="8" fill="#333333" opacity="0.05"/>
      <circle cx="15" cy="15" r="6" fill="#00d4aa"/>
      <text x="30" y="20" fill="#333333" font-size="12" font-weight="600">3D Depth ✓</text>
      <text x="145" y="20" text-anchor="end" fill="#00d4aa" font-size="12" font-weight="bold">97%</text>
    </g>
  </g>

  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666666" />
    </marker>
  </defs>
  <line x1="290" y1="320" x2="305" y2="320" stroke="#666666" stroke-width="3" marker-end="url(#arrowhead2)"/>
  <line x1="500" y1="320" x2="515" y2="320" stroke="#666666" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Tech Stack Footer -->
  <g transform="translate(50, 565)">
    <text x="0" y="0" fill="#ffffff" font-size="14" font-weight="600" opacity="0.9">Tech Stack:</text>
    <rect x="80" y="-12" width="90" height="20" rx="10" fill="#ff6f00" opacity="0.8"/>
    <text x="125" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">TensorFlow</text>
    
    <rect x="180" y="-12" width="75" height="20" rx="10" fill="#5c3ee8" opacity="0.8"/>
    <text x="217" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">OpenCV</text>
    
    <rect x="265" y="-12" width="60" height="20" rx="10" fill="#d00000" opacity="0.8"/>
    <text x="295" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Keras</text>
    
    <rect x="335" y="-12" width="70" height="20" rx="10" fill="#3776ab" opacity="0.8"/>
    <text x="370" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Python</text>
    
    <rect x="415" y="-12" width="95" height="20" rx="10" fill="#009688" opacity="0.8"/>
    <text x="462" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Face-Recognition</text>
  </g>
</svg>
