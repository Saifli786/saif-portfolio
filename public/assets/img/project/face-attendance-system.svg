<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
  <defs>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="dashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold" font-family="Arial, sans-serif">
    Face Attendance System
  </text>
  <text x="400" y="80" text-anchor="middle" fill="#ffffff" font-size="16" font-family="Arial, sans-serif" opacity="0.9">
    Real-Time Face Recognition with Automated Attendance Management
  </text>

  <!-- Main Container -->
  <rect x="30" y="110" width="740" height="440" rx="20" fill="url(#cardGradient3)" filter="url(#shadow3)"/>

  <!-- Camera Recognition Section -->
  <g transform="translate(50, 140)">
    <rect x="0" y="0" width="220" height="360" rx="12" fill="#4facfe" opacity="0.1" stroke="#4facfe" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">Recognition System</text>
    
    <!-- Camera Feed -->
    <rect x="35" y="45" width="150" height="110" rx="8" fill="#1a1a1a" stroke="#4facfe" stroke-width="3"/>
    
    <!-- Multiple Faces -->
    <g transform="translate(55, 65)">
      <!-- Face 1 -->
      <ellipse cx="25" cy="25" rx="20" ry="25" fill="#4facfe" opacity="0.4"/>
      <circle cx="20" cy="22" r="3" fill="#ffffff"/>
      <circle cx="30" cy="22" r="3" fill="#ffffff"/>
      <path d="M 18 32 Q 25 36, 32 32" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="5" y="5" width="40" height="45" fill="none" stroke="#00d4aa" stroke-width="2"/>
      <text x="25" y="58" text-anchor="middle" fill="#00d4aa" font-size="8" font-weight="bold">John Doe</text>
      
      <!-- Face 2 -->
      <ellipse cx="85" cy="25" rx="20" ry="25" fill="#00f2fe" opacity="0.4"/>
      <circle cx="80" cy="22" r="3" fill="#ffffff"/>
      <circle cx="90" cy="22" r="3" fill="#ffffff"/>
      <path d="M 78 32 Q 85 36, 92 32" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="65" y="5" width="40" height="45" fill="none" stroke="#00d4aa" stroke-width="2"/>
      <text x="85" y="58" text-anchor="middle" fill="#00d4aa" font-size="8" font-weight="bold">Jane Smith</text>
    </g>
    
    <!-- Recognition Stats -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="180" height="45" rx="8" fill="#00d4aa" opacity="0.15"/>
      <text x="15" y="20" fill="#333333" font-size="13" font-weight="bold">Detected: 2 faces</text>
      <text x="15" y="37" fill="#00d4aa" font-size="12" font-weight="600">✓ Recognition: 100%</text>
    </g>
    
    <!-- Time Record -->
    <g transform="translate(20, 235)">
      <rect x="0" y="0" width="180" height="35" rx="8" fill="#4facfe" opacity="0.1" stroke="#4facfe" stroke-width="1.5"/>
      <circle cx="20" cy="17" r="8" fill="#4facfe" opacity="0.3"/>
      <text x="20" y="21" text-anchor="middle" fill="#333333" font-size="10" font-weight="bold">⏰</text>
      <text x="40" y="22" fill="#333333" font-size="12" font-weight="600">09:15:32 AM</text>
    </g>
    
    <!-- Actions -->
    <g transform="translate(20, 285)">
      <rect x="0" y="0" width="85" height="30" rx="8" fill="#00d4aa" opacity="0.9" filter="url(#shadow3)"/>
      <text x="42" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Mark IN</text>
      
      <rect x="95" y="0" width="85" height="30" rx="8" fill="#f5576c" opacity="0.9" filter="url(#shadow3)"/>
      <text x="137" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Mark OUT</text>
    </g>
    
    <!-- Status -->
    <circle cx="110" cy="338" r="8" fill="#00d4aa" filter="url(#glow3)"/>
    <text x="110" y="355" text-anchor="middle" fill="#00d4aa" font-size="11" font-weight="bold">ACTIVE</text>
  </g>

  <!-- Database/Processing Section -->
  <g transform="translate(295, 140)">
    <rect x="0" y="0" width="180" height="360" rx="12" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">Processing</text>
    
    <!-- Database Icon -->
    <g transform="translate(60, 50)">
      <ellipse cx="30" cy="15" rx="28" ry="10" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
      <rect x="2" y="15" width="56" height="30" fill="#6366f1" opacity="0.2"/>
      <ellipse cx="30" cy="45" rx="28" ry="10" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
      <line x1="2" y1="15" x2="2" y2="45" stroke="#6366f1" stroke-width="2"/>
      <line x1="58" y1="15" x2="58" y2="45" stroke="#6366f1" stroke-width="2"/>
      <text x="30" y="32" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="bold">DATA</text>
    </g>
    
    <!-- Processing Steps -->
    <g transform="translate(15, 130)">
      <rect x="0" y="0" width="150" height="28" rx="8" fill="#4facfe" opacity="0.15"/>
      <circle cx="14" cy="14" r="6" fill="#4facfe"/>
      <text x="28" y="18" fill="#333333" font-size="11" font-weight="600">Face Encoding</text>
      
      <rect x="0" y="38" width="150" height="28" rx="8" fill="#00f2fe" opacity="0.15"/>
      <circle cx="14" cy="52" r="6" fill="#00f2fe"/>
      <text x="28" y="56" fill="#333333" font-size="11" font-weight="600">Match Database</text>
      
      <rect x="0" y="76" width="150" height="28" rx="8" fill="#6366f1" opacity="0.15"/>
      <circle cx="14" cy="90" r="6" fill="#6366f1"/>
      <text x="28" y="94" fill="#333333" font-size="11" font-weight="600">Log Attendance</text>
      
      <rect x="0" y="114" width="150" height="28" rx="8" fill="#00d4aa" opacity="0.15"/>
      <circle cx="14" cy="128" r="6" fill="#00d4aa"/>
      <text x="28" y="132" fill="#333333" font-size="11" font-weight="600">Update Records</text>
    </g>
    
    <!-- Stats -->
    <g transform="translate(15, 275)">
      <rect x="0" y="0" width="150" height="70" rx="10" fill="url(#dashGradient)" opacity="0.1" stroke="#4facfe" stroke-width="2"/>
      <text x="75" y="20" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Today's Summary</text>
      <text x="20" y="40" fill="#333333" font-size="11">Present: </text>
      <text x="130" y="40" text-anchor="end" fill="#00d4aa" font-size="13" font-weight="bold">45</text>
      <text x="20" y="57" fill="#333333" font-size="11">Absent: </text>
      <text x="130" y="57" text-anchor="end" fill="#f5576c" font-size="13" font-weight="bold">5</text>
    </g>
  </g>

  <!-- Dashboard Section -->
  <g transform="translate(500, 140)">
    <rect x="0" y="0" width="240" height="360" rx="12" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
    <text x="120" y="25" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">Admin Dashboard</text>
    
    <!-- Dashboard Screen -->
    <rect x="20" y="45" width="200" height="120" rx="8" fill="#1a1a1a" stroke="#10b981" stroke-width="2"/>
    
    <!-- Chart Representation -->
    <g transform="translate(30, 65)">
      <text x="0" y="0" fill="#4facfe" font-size="10" font-weight="bold">Attendance Chart</text>
      <!-- Bar chart -->
      <rect x="10" y="15" width="18" height="50" rx="3" fill="#4facfe" opacity="0.8"/>
      <rect x="35" y="25" width="18" height="40" rx="3" fill="#00f2fe" opacity="0.8"/>
      <rect x="60" y="10" width="18" height="55" rx="3" fill="#10b981" opacity="0.8"/>
      <rect x="85" y="30" width="18" height="35" rx="3" fill="#6366f1" opacity="0.8"/>
      <rect x="110" y="20" width="18" height="45" rx="3" fill="#00d4aa" opacity="0.8"/>
      <rect x="135" y="15" width="18" height="50" rx="3" fill="#4facfe" opacity="0.8"/>
      <!-- X axis -->
      <line x1="5" y1="70" x2="165" y2="70" stroke="#888888" stroke-width="1"/>
      <text x="85" y="85" text-anchor="middle" fill="#888888" font-size="8">Last 7 Days</text>
    </g>
    
    <!-- Records List -->
    <g transform="translate(20, 180)">
      <text x="0" y="0" fill="#333333" font-size="13" font-weight="bold">Recent Records</text>
      
      <!-- Record 1 -->
      <rect x="0" y="10" width="200" height="30" rx="6" fill="#00d4aa" opacity="0.1"/>
      <circle cx="15" cy="25" r="8" fill="#4facfe" opacity="0.3"/>
      <text x="15" y="28" text-anchor="middle" fill="#333333" font-size="8" font-weight="bold">JD</text>
      <text x="32" y="22" fill="#333333" font-size="11" font-weight="600">John Doe</text>
      <text x="32" y="33" fill="#666666" font-size="9">09:15 AM</text>
      <circle cx="185" cy="25" r="5" fill="#00d4aa"/>
      
      <!-- Record 2 -->
      <rect x="0" y="48" width="200" height="30" rx="6" fill="#00d4aa" opacity="0.1"/>
      <circle cx="15" cy="63" r="8" fill="#00f2fe" opacity="0.3"/>
      <text x="15" y="66" text-anchor="middle" fill="#333333" font-size="8" font-weight="bold">JS</text>
      <text x="32" y="60" fill="#333333" font-size="11" font-weight="600">Jane Smith</text>
      <text x="32" y="71" fill="#666666" font-size="9">09:16 AM</text>
      <circle cx="185" cy="63" r="5" fill="#00d4aa"/>
      
      <!-- Record 3 -->
      <rect x="0" y="86" width="200" height="30" rx="6" fill="#f5576c" opacity="0.1"/>
      <circle cx="15" cy="101" r="8" fill="#6366f1" opacity="0.3"/>
      <text x="15" y="104" text-anchor="middle" fill="#333333" font-size="8" font-weight="bold">MB</text>
      <text x="32" y="98" fill="#333333" font-size="11" font-weight="600">Mike Brown</text>
      <text x="32" y="109" fill="#666666" font-size="9">Absent</text>
      <circle cx="185" cy="101" r="5" fill="#f5576c"/>
    </g>
    
    <!-- Export Button -->
    <rect x="20" y="320" width="200" height="35" rx="10" fill="#4facfe" opacity="0.9" filter="url(#shadow3)"/>
    <text x="120" y="343" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">📥 Export Records</text>
  </g>

  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowhead3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666666" />
    </marker>
  </defs>
  <line x1="278" y1="320" x2="290" y2="320" stroke="#666666" stroke-width="3" marker-end="url(#arrowhead3)"/>
  <line x1="483" y1="320" x2="495" y2="320" stroke="#666666" stroke-width="3" marker-end="url(#arrowhead3)"/>

  <!-- Tech Stack Footer -->
  <g transform="translate(50, 565)">
    <text x="0" y="0" fill="#ffffff" font-size="14" font-weight="600" opacity="0.9">Tech Stack:</text>
    <rect x="80" y="-12" width="115" height="20" rx="10" fill="#009688" opacity="0.8"/>
    <text x="137" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Face-Recognition</text>
    
    <rect x="205" y="-12" width="60" height="20" rx="10" fill="#000000" opacity="0.8"/>
    <text x="235" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Flask</text>
    
    <rect x="275" y="-12" width="75" height="20" rx="10" fill="#00758f" opacity="0.8"/>
    <text x="312" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">MySQL</text>
    
    <rect x="360" y="-12" width="75" height="20" rx="10" fill="#e34f26" opacity="0.8"/>
    <text x="397" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">HTML/CSS</text>
    
    <rect x="445" y="-12" width="70" height="20" rx="10" fill="#3776ab" opacity="0.8"/>
    <text x="480" y="2" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Python</text>
  </g>
</svg>
